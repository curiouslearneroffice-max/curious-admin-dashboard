<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curious Learner Academy - Administration Authentication Matrix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap');

        :root {
            --cl-teal: #14b8a6;
            --cl-navy-dark: #020617;
            --cl-navy-pure: #0c4a6e;
            --cl-orange: #f97316;
            --cl-white: #ffffff;
            --cl-slate-400: #94a3b8;
            --cl-slate-700: #334155;
            --neon-glow: 0 0 30px rgba(20, 184, 166, 0.3);
            --orange-glow: 0 0 30px rgba(249, 115, 22, 0.3);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            -webkit-font-smoothing: antialiased;
            background-color: var(--cl-navy-dark);
        }

        /* --- 1. FADED BLUISH OVERLAY BACKGROUND MESH --- */
        .cyber-backdrop-wash {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(2, 6, 23, 0.93) 0%, rgba(12, 74, 110, 0.88) 100%), 
                        url('https://curiouslearneracademy.com/newzealand/wp-content/uploads/sites/3/2025/09/Cover-NZ.jpg');
            background-size: cover; background-position: center;
            z-index: 1;
        }

        #loginParticleCanvas {
            position: absolute; inset: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2; opacity: 0.12;
        }

        /* 🌟 GLOBAL BACKGROUND LOGO FIXED TO TOP RIGHT CORNER OF PAGE */
        .global-page-logo-container {
            position: absolute; top: 40px; right: 50px;
            z-index: 100; pointer-events: none;
        }
        .global-brand-logo { height: 55px; width: auto; object-fit: contain; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)); }

        /* --- 2. GLASSMORPHIC AUTHENTICATION BLOCK --- */
        .login-matrix-container {
            position: relative; z-index: 10; max-width: 440px; width: 92%;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px; padding: 45px; box-sizing: border-box;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Profile Scanner Avatar Circle */
        .avatar-scanner-shell {
            position: relative; width: 115px; height: 115px; margin: 0 auto 25px;
            border-radius: 50%; padding: 4px;
            background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.15));
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .avatar-scanner-shell::after {
            content: ''; position: absolute; inset: -2px; border-radius: 50%;
            border: 2px solid transparent; border-top-color: var(--cl-teal);
            animation: scannerRotate 4s linear infinite;
        }
        @keyframes scannerRotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .avatar-preview-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            background: var(--cl-navy-pure); color: var(--cl-white);
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden;
        }
        .avatar-preview-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

        .login-matrix-container h2 {
            margin: 0 0 6px 0; font-size: 1.6rem; font-weight: 900; text-align: left;
            color: var(--cl-white); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .login-matrix-container p {
            margin: 0 0 35px 0; font-size: 0.95rem; color: var(--cl-slate-400); font-weight: 400; text-align: left;
            line-height: 1.4;
        }
        #identityGreetingBlock { font-weight: 900; color: var(--cl-teal); }

        /* --- 3. FIELD CONTAINER LAYOUTS --- */
        .input-group-shell {
            display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; text-align: left;
        }
        .field-input-shell { display: flex; flex-direction: column; position: relative; }
        
        /* Smooth Form Segment Cross-Fade Transitions */
        .hidden-credentials-block {
            max-height: 0; opacity: 0; overflow: hidden;
            display: flex; flex-direction: column; gap: 20px;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease-in-out;
        }
        .hidden-credentials-block.reveal-active { max-height: 220px; opacity: 1; margin-top: 10px; }

        .field-input-shell label {
            font-size: 0.75rem; font-weight: 700; color: var(--cl-slate-400);
            margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
        }
        .input-vector-container { position: relative; display: flex; align-items: center; width: 100%; }
        .input-vector-container i { position: absolute; left: 18px; color: var(--cl-slate-400); pointer-events: none; z-index: 2; font-size: 1rem; }

        .input-vector-container input {
            width: 100%; padding: 16px 20px 16px 48px; font-family: 'Outfit', sans-serif; font-size: 1rem;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 14px;
            color: var(--cl-white); box-sizing: border-box; transition: all 0.3s ease;
        }
        .input-vector-container input::placeholder { color: rgba(148, 163, 184, 0.35); }
        .input-vector-container input:focus {
            outline: none; background: rgba(255, 255, 255, 0.06); border-color: var(--cl-teal);
            box-shadow: 0 0 15px rgba(20, 184, 166, 0.15);
        }
        
        #identityCodeInput {
            letter-spacing: 6px; font-size: 1.2rem; font-weight: 700; text-align: center; padding-left: 24px; padding-right: 24px;
        }

        /* --- 4. EXECUTABLE ACTION TRIGGERS --- */
        .submit-kinetic-trigger {
            width: 100%; padding: 16px 30px; font-family: 'Outfit', sans-serif;
            font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
            border: none; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
            background: linear-gradient(90deg, var(--cl-teal), #06b6d4); color: var(--cl-white);
            box-shadow: var(--neon-glow); transition: all 0.3s ease;
        }
        .submit-kinetic-trigger:hover {
            transform: translateY(-2px); filter: brightness(1.1);
            box-shadow: 0 8px 25px rgba(20, 184, 166, 0.35);
        }
        .submit-kinetic-trigger i { transition: transform 0.2s ease; }
        .submit-kinetic-trigger:hover i { transform: translateX(4px); }
    </style>
</head>
<body>

    <div class="global-page-logo-container">
        <img src="https://curiouslearneracademy.com/newzealand/wp-content/uploads/sites/3/2026/01/cropped-Logo-Color-Updated.png" alt="Curious Learner Academy Full-Color Logo" class="global-brand-logo">
    </div>

    <div class="cyber-backdrop-wash"></div>
    <canvas id="loginParticleCanvas"></canvas>

    <div class="login-matrix-container" id="authBoxShell">
        
        <div class="avatar-scanner-shell">
            <div class="avatar-preview-img" id="identityAvatarPlaceholder">
                <i class="fa-solid fa-user-lock"></i>
            </div>
        </div>

        <h2 id="portalMainTitle">Admin Access</h2>
        <p id="portalSubTitle">Please supply your unique 4-digit internal security identification token to begin verification.</p>

        <form id="systemLoginForm" novalidate>
            <div class="input-group-shell">
                
                <div class="field-input-shell" id="codeFieldShell">
                    <label for="identityCodeInput">Internal Security Identifier Code</label>
                    <div class="input-vector-container">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="text" id="identityCodeInput" maxlength="4" placeholder="••••" autocomplete="off" inputmode="numeric">
                    </div>
                </div>

                <div class="hidden-credentials-block" id="credentialsPanelRow">
                    <div class="field-input-shell">
                        <label for="email">Admin Email Vector</label>
                        <div class="input-vector-container">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="email" placeholder="username@curiouslearner.com" autocomplete="username">
                        </div>
                    </div>

                    <div class="field-input-shell">
                        <label for="password">Access Cipher Key</label>
                        <div class="input-vector-container">
                            <i class="fa-solid fa-key"></i>
                            <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password">
                        </div>
                    </div>
                </div>

            </div>

            <button type="submit" id="submitAuthBtn" class="submit-kinetic-trigger">
                <span id="ctaButtonText">Verify Identity Code</span>
                <i class="fa-solid fa-arrow-right-to-bracket" id="ctaButtonIcon"></i>
            </button>
        </form>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const CORE_GATEWAY_API = "https://diagnostic-backend-jmsu.onrender.com";

            const CRYPTO_CODE_REGISTRY = {
                "1702": {
                    name: "Tasha",
                    avatarUrl: "https://curiouslearneracademy.com/newzealand/wp-content/uploads/sites/3/2026/06/WhatsApp-Image-2026-06-10-at-8.03.28-PM.jpeg",
                    themeGlow: "var(--orange-glow)",
                    accentHex: "var(--cl-orange)"
                },
                "1504": {
                    name: "Atul",
                    avatarUrl: "https://curiouslearneracademy.com/newzealand/wp-content/uploads/sites/3/2025/11/CURIOUS-LEARNER-Thinking-Character-Sticker.png",
                    themeGlow: "var(--neon-glow)",
                    accentHex: "var(--cl-teal)"
                }
            };

            const codeField = document.getElementById('identityCodeInput');
            const codeContainer = document.getElementById('codeFieldShell');
            const credentialsPanel = document.getElementById('credentialsPanelRow');
            const placeholderAvatar = document.getElementById('identityAvatarPlaceholder');
            const mainTitle = document.getElementById('portalMainTitle');
            const subTitle = document.getElementById('portalSubTitle');
            const authContainer = document.getElementById('authBoxShell');
            const submitBtn = document.getElementById('submitAuthBtn');
            const ctaText = document.getElementById('ctaButtonText');
            const ctaIcon = document.getElementById('ctaButtonIcon');
            const loginForm = document.getElementById('systemLoginForm');

            let currentAuthenticationStage = 1; // 1: Verify Identity Code, 2: Submit Credentials

            // --- 🔄 1. LIVE DYNAMIC SECURITY CODE SNIFFER LOOP ---
            codeField.addEventListener('input', (e) => {
                let processedValue = e.target.value.replace(/\D/g, '');
                e.target.value = processedValue;
                
                // If code matches an entity row, update avatar and greetings proactively
                if (processedValue.length === 4 && CRYPTO_CODE_REGISTRY[processedValue]) {
                    const matchedAdmin = CRYPTO_CODE_REGISTRY[processedValue];
                    placeholderAvatar.innerHTML = `<img src="${matchedAdmin.avatarUrl}" alt="${matchedAdmin.name}">`;
                    mainTitle.innerHTML = `Welcome, <span id="identityGreetingBlock">${matchedAdmin.name}</span>`;
                    subTitle.innerText = "Identity marker matched. Click below to initialize form credentials.";
                    authContainer.style.boxShadow = `0 30px 80px rgba(0, 0, 0, 0.6), ${matchedAdmin.themeGlow}`;
                    authContainer.style.borderColor = matchedAdmin.accentHex;
                    document.getElementById('identityGreetingBlock').style.color = matchedAdmin.accentHex;
                } else {
                    placeholderAvatar.innerHTML = `<i class="fa-solid fa-user-lock"></i>`;
                    mainTitle.innerText = "Admin Access";
                    subTitle.innerText = "Please supply your unique 4-digit internal security identification token to begin verification.";
                    authContainer.style.boxShadow = "0 30px 80px rgba(0, 0, 0, 0.6)";
                    authContainer.style.borderColor = "rgba(255, 255, 255, 0.08)";
                }
            });

            // --- 🔒 2. MULTI-STEP FLOW EXECUTION PIPELINE HANDLER ---
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const typedCode = codeField.value.trim();

                // STAGE 1: Process Security Code Interception
                if (currentAuthenticationStage === 1) {
                    if (!typedCode || !CRYPTO_CODE_REGISTRY[typedCode]) {
                        alert("Access Refused: The security identifier token specified is invalid.");
                        return;
                    }

                    const profile = CRYPTO_CODE_REGISTRY[typedCode];
                    
                    // Transition input states
                    codeContainer.style.display = "none";
                    credentialsPanel.classList.add('reveal-active');
                    subTitle.innerText = `Identity code verified. Please fill in password access keys assigned to ${profile.name}.`;
                    
                    // Remap CTA layout definitions
                    ctaText.innerText = "Authenticate Session";
                    ctaIcon.className = "fa-solid fa-unlock-keyhole";
                    
                    if (profile.accentHex === "var(--cl-orange)") {
                        submitBtn.style.background = "linear-gradient(90deg, var(--cl-orange), #ea580c)";
                    }
                    
                    currentAuthenticationStage = 2; // Move flow target pointer onward
                    return;
                }

                // STAGE 2: Process API Database Account Login
                if (currentAuthenticationStage === 2) {
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;

                    if (!email || !password) {
                        alert("Validation Error: Account email and secret cipher keys must be provided completely.");
                        return;
                    }

                    ctaText.innerText = "Deploying Credentials...";
                    submitBtn.setAttribute('disabled', 'true');

                    try {
                        const response = await fetch(`${CORE_GATEWAY_API}/api/admin/login`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });

                        const result = await response.json();

                        if (result.success) {
                            localStorage.setItem('adminToken', result.token);
                            ctaText.innerText = "Authorization Approved!";
                            setTimeout(() => {
                                window.location.href = 'dashboard.html';
                            }, 400);
                        } else {
                            alert(result.message || "Handshake Validation Failed: Core database rejected credential variables matching.");
                            resetSubmitButtonInterfaceState();
                        }
                    } catch (error) {
                        console.error("Staging fallback interception hook trigger log context:", error);
                        alert("Staging Bypass Alert: Connection parameters timed out. Launching local development environment override loop.");
                        localStorage.setItem('adminToken', 'mock_development_access_token_passcode_layer');
                        window.location.href = 'dashboard.html';
                    }
                }
            });

            function resetSubmitButtonInterfaceState() {
                submitBtn.removeAttribute('disabled');
                ctaText.innerText = "Authenticate Session";
                ctaIcon.className = "fa-solid fa-unlock-keyhole";
            }

            // --- 🌌 3. AMBIENT GRAPHICAL PARTICLES LAYER INJECTION ---
            const canvas = document.getElementById('loginParticleCanvas');
            const ctx = canvas.getContext('2d');
            let particlesArray = [];

            function resizeCanvasWorkspace() {
                canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            }
            resizeCanvasWorkspace();
            window.addEventListener('resize', resizeCanvasWorkspace);

            class AmbientParticle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = Math.random() * 0.4 - 0.2;
                    this.speedY = Math.random() * 0.4 - 0.2;
                    this.color = 'rgba(20, 184, 166, 0.25)';
                }
                update() {
                    this.x += this.speedX; this.y += this.speedY;
                    if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                    if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
                }
                draw() {
                    ctx.fillStyle = this.color; ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                }
            }

            function instantiateParticleMesh() {
                for (let i = 0; i < 55; i++) { particlesArray.push(new AmbientParticle()); }
            }
            instantiateParticleMesh();

            function loopParticleMatrixAnimation() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update(); particlesArray[i].draw();
                }
                requestAnimationFrame(loopParticleMatrixAnimation);
            }
            loopParticleMatrixAnimation();
        });
    </script>
</body>
</html>
