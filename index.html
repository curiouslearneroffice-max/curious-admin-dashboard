<!DOCTYPE html>
<html>
<head>
    <title>Curious Learner Admin Login</title>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f5f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            box-shadow:0 10px 25px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ddd;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#0c4a6e;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

<div class="login-box">

    <h2>Admin Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="login()">
        Login
    </button>

</div>

<script>

const API =
"https://diagnostic-backend-jmsu.onrender.com";

async function login(){

    const email =
    document.getElementById('email').value;

    const password =
    document.getElementById('password').value;

    const response =
    await fetch(
        `${API}/api/admin/login`,
        {
            method:'POST',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({
                email,
                password
            })
        }
    );

    const data =
    await response.json();

    if(data.success){

        localStorage.setItem(
            'adminToken',
            data.token
        );

        window.location.href =
        'dashboard.html';

    }else{

        alert(data.message);

    }

}

</script>

</body>
</html>
