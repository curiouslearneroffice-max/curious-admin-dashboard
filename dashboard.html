<body>

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<h2 id="totalStudents">0</h2>
<p>Total Students</p>
</div>

<div class="card">
<h2 id="y12">0</h2>
<p>Year 1-2</p>
</div>

<div class="card">
<h2 id="y34">0</h2>
<p>Year 3-4</p>
</div>

<div class="card">

<p>Year 5-6</p>
</div>

<div class="card">
<h2 id="y78">0</h2>
<p>Year 7-8</p>
</div>

<table id="studentTable">
<thead>
<tr>
<th>Name</th>
<th>Year</th>
<th>School</th>
<th>Parent</th>
<th>Email</th>
<th>Phone</th>

</thead>

<tbody></tbody>

</table>

<script src="app.js"></script>

</body>
</html>
